name: Veracode SCA (Dependency Scan)

# Veracode Software Composition Analysis — scans open-source dependencies for
# known CVEs and license issues, and reports results to the Veracode platform.
#
# This complements the OWASP dependency-check gate in Maven (which gates the
# build locally). The Veracode SCA scan gives the security team a centralized,
# authoritative view across all projects in the Veracode platform.
#
# Runs:
#   • On every PR to main (fast feedback loop)
#   • On push to main (records baseline after merge)
#   • Weekly (Monday 07:00 UTC) — catches newly disclosed CVEs between merges
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SRCCLR_API_TOKEN  – Veracode SCA agent token (from Veracode platform →
#                       Integrations → Source Clear Agent → Generate Token)
#                       NOTE: this is separate from VERACODE_API_ID/KEY used
#                       by static analysis scans.
#
# Optional GitHub Variables (Settings → Variables → Actions):
#   VERACODE_PROXY_HOST – corporate proxy hostname
#   VERACODE_PROXY_PORT – corporate proxy port
#
# Connectivity guard: each scan step is preceded by a 2-attempt reachability
# check against api.veracode.com. If both attempts fail the scan step is
# skipped (not failed), so a platform outage never blocks a code push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'   # Weekly: Monday 07:00 UTC

concurrency:
  group: veracode-sca-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # BACKEND SCA — Maven dependency tree
  # ─────────────────────────────────────────────────────────────────
  sca-backend:
    name: SCA — Backend (Maven)
    runs-on: ubuntu-latest
    # Skip on fork PRs — they don't have access to org secrets
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # Resolve Maven dependency tree (needed by srcclr agent before scan)
      - name: Resolve Maven dependencies
        working-directory: fabric-core
        run: mvn dependency:resolve -pl fabric-api -DincludeScope=compile -q

      # Veracode SCA Agent scan of the Maven project.
      # The agent reads pom.xml and the resolved dependency tree.
      # quick_scan=true scans direct + transitive deps without full resolve;
      # set to false for a deeper (slower) scan on the weekly schedule.

      # Check reachability before submitting. Retries once (2 total attempts)
      # then skips — a platform outage never blocks a code push.
      - name: Check Veracode SCA connectivity (retry 2×, skip scan if unreachable)
        id: veracode_conn
        run: |
          for attempt in 1 2; do
            if curl --silent --max-time 20 --output /dev/null https://api.veracode.com/ 2>/dev/null; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::Veracode SCA API unreachable (attempt ${attempt}/2)"
            [ $attempt -lt 2 ] && sleep 30
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Veracode SCA API unreachable after 2 attempts — Maven SCA scan will be skipped"

      - name: Veracode SCA — Maven
        if: steps.veracode_conn.outputs.reachable == 'true'
        uses: veracode/veracode-sca@v2.1.9
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
          # Enterprise proxy (set vars in GitHub Variables if behind a proxy)
          SRCCLR_PROXY: ${{ vars.VERACODE_PROXY_HOST != '' && format('{0}:{1}', vars.VERACODE_PROXY_HOST, vars.VERACODE_PROXY_PORT) || '' }}
        with:
          path: fabric-core/fabric-api
          # Create a pull request comment with findings on PRs
          create-issues: false        # set true to auto-open GitHub issues
          # Fail the build on high-severity findings (CVSS >= 7.0)
          # This mirrors the OWASP gate threshold in pom.xml
          fail_on_cvss: 7
          quick_scan: ${{ github.event_name != 'schedule' }}

  # ─────────────────────────────────────────────────────────────────
  # FRONTEND SCA — npm dependency tree
  # ─────────────────────────────────────────────────────────────────
  sca-frontend:
    name: SCA — Frontend (npm)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: fabric-ui/package-lock.json

      # Install deps so the srcclr agent can read the lock file
      - name: Install npm dependencies
        working-directory: fabric-ui
        run: npm ci

      # Veracode SCA Agent scan of the npm project.
      # Reads package.json + package-lock.json.

      # Check reachability before submitting. Retries once (2 total attempts)
      # then skips — a platform outage never blocks a code push.
      - name: Check Veracode SCA connectivity (retry 2×, skip scan if unreachable)
        id: veracode_conn
        run: |
          for attempt in 1 2; do
            if curl --silent --max-time 20 --output /dev/null https://api.veracode.com/ 2>/dev/null; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::Veracode SCA API unreachable (attempt ${attempt}/2)"
            [ $attempt -lt 2 ] && sleep 30
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Veracode SCA API unreachable after 2 attempts — npm SCA scan will be skipped"

      - name: Veracode SCA — npm
        if: steps.veracode_conn.outputs.reachable == 'true'
        uses: veracode/veracode-sca@v2.1.9
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
          SRCCLR_PROXY: ${{ vars.VERACODE_PROXY_HOST != '' && format('{0}:{1}', vars.VERACODE_PROXY_HOST, vars.VERACODE_PROXY_PORT) || '' }}
        with:
          path: fabric-ui
          create-issues: false
          fail_on_cvss: 7
          quick_scan: ${{ github.event_name != 'schedule' }}

  # ─────────────────────────────────────────────────────────────────
  # NOTIFY — open GitHub issue if weekly scan finds new CVEs
  # (weekly schedule only — PR/push failures surface directly in the check)
  # Skipped scans (connectivity failure) do not trigger this job because
  # a skipped step does not set the job status to 'failure'.
  # ─────────────────────────────────────────────────────────────────
  notify-on-failure:
    name: Notify on SCA Findings
    needs: [sca-backend, sca-frontend]
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Open GitHub issue on new CVEs
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] Veracode SCA found high-severity CVEs — ${today}`,
              body: [
                'The weekly Veracode SCA scan detected high-severity (CVSS ≥ 7.0) vulnerabilities',
                'in project dependencies.',
                '',
                `Workflow run: ${runUrl}`,
                '',
                'Action required:',
                '- Review findings in the Veracode platform (SCA dashboard)',
                '- Update affected dependencies or add suppression with justification',
                '- Re-run scan to confirm remediation'
              ].join('\n'),
              labels: ['security', 'dependencies']
            });
