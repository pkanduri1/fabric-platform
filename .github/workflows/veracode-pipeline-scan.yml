name: Veracode Pipeline Scan (SAST)

# Fast SAST scan (~60 s) on every PR and push to main.
# Fails the build on Very High or High severity findings.
# Full policy scan (slower, authoritative) runs separately via veracode-policy-scan.yml.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERACODE_API_ID   – Veracode API credentials ID
#   VERACODE_API_KEY  – Veracode API credentials key
#
# Optional GitHub Variables (Settings → Variables → Actions):
#   VERACODE_PROXY_HOST – corporate proxy hostname
#   VERACODE_PROXY_PORT – corporate proxy port

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: veracode-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  veracode-pipeline-scan:
    name: Veracode Pipeline Scan
    runs-on: ubuntu-latest
    # Skip on fork PRs — they don't have access to org secrets
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      security-events: write   # upload SARIF to GitHub Security tab
      pull-requests: write     # post scan results as PR comment

    steps:
      - uses: actions/checkout@v4

      # ── Build the Spring Boot fat JAR ──────────────────────────────────────
      # Veracode scans compiled bytecode, not source. Skip tests here — the CI
      # workflow handles test execution separately.
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Package backend artifact
        working-directory: fabric-core
        run: mvn package -pl fabric-api -DskipTests -q

      # ── Build the React bundle ──────────────────────────────────────────────
      # Veracode scans compiled JS, not node_modules source.
      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: fabric-ui/package-lock.json

      - name: Build frontend bundle
        working-directory: fabric-ui
        run: |
          npm ci
          npm run build

      # ── Assemble upload artifact ────────────────────────────────────────────
      # Single ZIP with JAR + compiled JS bundle for Veracode to scan both layers.
      - name: Assemble Veracode upload artifact
        run: |
          mkdir -p veracode-upload
          cp fabric-core/fabric-api/target/fabric-api-*.jar veracode-upload/
          zip -r veracode-upload/frontend-bundle.zip fabric-ui/build/static/js/
          echo "Artifact contents:"
          ls -lh veracode-upload/

      # ── Veracode Pipeline Scanner ───────────────────────────────────────────
      # Credentials come exclusively from GitHub Secrets, never hardcoded.

      # Check reachability before submitting the scan. Retries once (2 total
      # attempts) then skips — a platform outage never blocks a code push.
      - name: Check Veracode API connectivity (retry 2×, skip scan if unreachable)
        id: veracode_conn
        run: |
          for attempt in 1 2; do
            if curl --silent --max-time 20 --output /dev/null https://api.veracode.com/ 2>/dev/null; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::Veracode API unreachable (attempt ${attempt}/2)"
            [ $attempt -lt 2 ] && sleep 30
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Veracode API unreachable after 2 attempts — pipeline scan will be skipped"

      - name: Run Veracode Pipeline Scanner
        if: steps.veracode_conn.outputs.reachable == 'true'
        uses: veracode/Veracode-pipeline-scan-github-action@v1.0.16
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: veracode-upload/fabric-api-*.jar
          # Gate: fail on Very High and High severity findings
          fail_on_severity: "Very High, High"
          # Gate: fail on specific CWEs critical for banking/fintech
          # 80=XSS, 89=SQL Injection, 78=OS Command Injection, 611=XXE, 918=SSRF
          fail_on_cwe: "80,89,78,611,918"

      # ── SARIF upload ────────────────────────────────────────────────────────
      - name: Convert results to SARIF
        if: always() && steps.veracode_conn.outputs.reachable == 'true'
        uses: veracode/pipeline-scan-action-to-sarif@v1.0.0
        with:
          pipeline-results-json: results.json
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        if: always() && steps.veracode_conn.outputs.reachable == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: veracode-pipeline.sarif
          category: veracode-sast
        continue-on-error: true

      # ── PR comment with findings summary ────────────────────────────────────
      - name: Post findings to PR
        if: always() && github.event_name == 'pull_request' && steps.veracode_conn.outputs.reachable == 'true'
        uses: veracode/github-actions-integration-helper@v0.1.3
        with:
          action: "addComment"
          token: ${{ secrets.GITHUB_TOKEN }}
          source_base_path_1: "fabric-core/fabric-api/src/"
          source_base_path_2: "fabric-ui/src/"
        continue-on-error: true
