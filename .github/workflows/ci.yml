name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 09:00 UTC — weekly SCA scan

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # BACKEND — runs mvn verify which includes:
  #   • Unit + integration tests (real Oracle)
  #   • JaCoCo coverage gate (≥9% baseline, rising toward 80%)
  #   • OWASP dependency-check SCA gate (CVSS ≥7 fails build)
  #
  # Pipeline-agnostic: any CI system can replicate this job by running
  #   cd fabric-core && mvn verify -pl fabric-api
  # ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Java + Oracle)
    runs-on: ubuntu-latest
    # Only run on push/PR events, not weekly schedule (weekly-sca handles that)
    if: github.event_name != 'schedule'

    services:
      oracle:
        image: gvenzl/oracle-free:slim
        env:
          ORACLE_PASSWORD: MySecurePass123
          APP_USER: cm3int
          APP_USER_PASSWORD: MySecurePass123
        ports:
          - 1522:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 180s

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # Cache OWASP NVD database — first download takes ~5 min, cached runs are fast
      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      # Check NVD reachability before running the OWASP gate.
      # Retries once (2 total attempts) then skips the SCA gate — not the build —
      # so a platform outage never blocks a code push.
      - name: Check NVD connectivity (retry 2×, skip OWASP gate if unreachable)
        id: nvd_conn
        run: |
          for attempt in 1 2; do
            if curl --silent --max-time 20 --output /dev/null https://nvd.nist.gov/ 2>/dev/null; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::NVD unreachable (attempt ${attempt}/2)"
            [ $attempt -lt 2 ] && sleep 30
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::NVD unreachable after 2 attempts — OWASP SCA gate will be skipped"

      - name: Build, test, coverage gate, and SCA gate
        working-directory: fabric-core
        env:
          DB_URL: jdbc:oracle:thin:@localhost:1522/FREEPDB1
          DB_USERNAME: cm3int
          DB_PASSWORD: MySecurePass123
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          SKIP_SCA=""
          if [ "${{ steps.nvd_conn.outputs.reachable }}" != "true" ]; then
            SKIP_SCA="-Ddependency-check.skip=true"
            echo "::warning::Skipping OWASP SCA gate — NVD unreachable after 2 connection attempts"
          fi
          mvn verify -pl fabric-api $SKIP_SCA

      - name: Upload OWASP SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: fabric-core/fabric-api/target/dependency-check-report/
          retention-days: 30

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: fabric-core/fabric-api/target/site/jacoco/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # FRONTEND — npm audit gate + build verification
  # ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node + npm audit)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: fabric-ui/package-lock.json

      - name: Install dependencies
        working-directory: fabric-ui
        run: npm ci

      # Check npm registry reachability before running audit.
      # Retries once (2 total attempts) then skips the audit — not the build.
      - name: Check npm registry connectivity (retry 2×, skip audit if unreachable)
        id: npm_conn
        run: |
          for attempt in 1 2; do
            if curl --silent --max-time 20 --output /dev/null https://registry.npmjs.org/ 2>/dev/null; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::npm registry unreachable (attempt ${attempt}/2)"
            [ $attempt -lt 2 ] && sleep 15
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::npm registry unreachable after 2 attempts — audit will be skipped"

      - name: SCA audit (high+ severity gate)
        working-directory: fabric-ui
        run: |
          if [ "${{ steps.npm_conn.outputs.reachable }}" = "true" ]; then
            npm audit --audit-level=high
          else
            echo "::warning::npm audit skipped — npm registry unreachable after 2 connection attempts"
          fi

      # When the registry is reachable, npm run build also runs the prebuild audit
      # hook. When unreachable, call react-scripts directly to skip the hook and
      # still verify the bundle compiles.
      - name: Build (prebuild hook also runs npm audit)
        working-directory: fabric-ui
        run: |
          if [ "${{ steps.npm_conn.outputs.reachable }}" = "true" ]; then
            npm run build
          else
            echo "::warning::Prebuild npm audit skipped (registry unreachable) — building directly"
            npx react-scripts build
          fi

  # ─────────────────────────────────────────────────────────────────
  # WEEKLY SCHEDULED SCA SCAN — catches newly disclosed CVEs
  # Runs even without code changes; opens a GitHub issue if new CVEs found.
  # ─────────────────────────────────────────────────────────────────
  weekly-sca:
    name: Weekly SCA Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-weekly-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-weekly-
            owasp-nvd-${{ runner.os }}-

      - name: Check NVD connectivity (retry 2×, skip OWASP if unreachable)
        id: nvd_conn
        run: |
          for attempt in 1 2; do
            if curl --silent --max-time 20 --output /dev/null https://nvd.nist.gov/ 2>/dev/null; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::NVD unreachable (attempt ${attempt}/2)"
            [ $attempt -lt 2 ] && sleep 30
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::NVD unreachable after 2 attempts — OWASP check will be skipped"

      - name: OWASP check only (skip tests for speed)
        working-directory: fabric-core
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ "${{ steps.nvd_conn.outputs.reachable }}" = "true" ]; then
            mvn dependency-check:check -pl fabric-api -Dmaven.test.skip=true
          else
            echo "::warning::OWASP SCA check skipped — NVD unreachable after 2 connection attempts"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: fabric-ui/package-lock.json

      - name: Check npm registry connectivity (retry 2×, skip audit if unreachable)
        id: npm_conn
        run: |
          for attempt in 1 2; do
            if curl --silent --max-time 20 --output /dev/null https://registry.npmjs.org/ 2>/dev/null; then
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::npm registry unreachable (attempt ${attempt}/2)"
            [ $attempt -lt 2 ] && sleep 15
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "::warning::npm registry unreachable after 2 attempts — audit will be skipped"

      - name: npm audit (frontend)
        working-directory: fabric-ui
        run: |
          npm ci
          if [ "${{ steps.npm_conn.outputs.reachable }}" = "true" ]; then
            npm audit --audit-level=high
          else
            echo "::warning::npm audit skipped — npm registry unreachable after 2 connection attempts"
          fi

      - name: Open issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] New high-severity CVEs detected — ${today}`,
              body: `The weekly SCA scan found new high-severity vulnerabilities.\n\nWorkflow run: ${runUrl}`,
              labels: ['security']
            });
