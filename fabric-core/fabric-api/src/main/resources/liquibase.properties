# Liquibase Configuration Properties
# Credentials supplied via env vars — override url/username/password in local dev via command line
# or via application-local.properties (gitignored).

# Database Connection — override at runtime with -Dliquibase.url etc.
driver=oracle.jdbc.OracleDriver
url=${DB_URL}
username=${DB_USERNAME}
password=${DB_PASSWORD}

# Changelog
changeLogFile=src/main/resources/db/changelog/db.changelog-master.xml
outputChangeLogFile=target/liquibase-outputChangeLog.xml

# Run ALL contexts by default (no label filter — label filter was silently skipping changesets)
dropFirst=false

# Schema
defaultSchemaName=CM3INT
liquibaseSchemaName=CM3INT

# Logging
logLevel=INFO
