# ============================================================
# LOCAL DEVELOPMENT OVERRIDES — gitignored, never commit this
# ============================================================
# Supplies the env vars required by application.yml.
# Copy this file locally after checkout; do not commit changes.

# Env vars for application.yml DB_URL / DB_USERNAME / DB_PASSWORD
DB_URL=jdbc:oracle:thin:@localhost:1522/FREEPDB1
DB_USERNAME=cm3int
DB_PASSWORD=MySecurePass123

# Readonly datasource (same as primary for local dev)
DB_READONLY_URL=jdbc:oracle:thin:@localhost:1522/FREEPDB1
DB_READONLY_USERNAME=cm3int
DB_READONLY_PASSWORD=MySecurePass123

# Spring datasource aliases (for local profile beans)
spring.datasource.url=jdbc:oracle:thin:@localhost:1522/FREEPDB1
spring.datasource.username=cm3int
spring.datasource.password=MySecurePass123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.primary.url=jdbc:oracle:thin:@localhost:1522/FREEPDB1
spring.datasource.primary.username=cm3int
spring.datasource.primary.password=MySecurePass123
spring.datasource.primary.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.readonly.url=jdbc:oracle:thin:@localhost:1522/FREEPDB1
spring.datasource.readonly.username=cm3int
spring.datasource.readonly.password=MySecurePass123
spring.datasource.readonly.driver-class-name=oracle.jdbc.OracleDriver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Liquibase — enable so pending changesets (e.g. JOB_PARAMETER_TEMPLATE) are applied
spring.liquibase.enabled=true

# LDAP — enable when fabric-ldap Docker container is running (docker run osixia/openldap on port 389)
# Set to false to skip LDAP and use JWT-only auth
fabric.security.ldap.enabled=false
LDAP_URL=ldap://localhost:389
LDAP_BASE_DN=dc=fabric,dc=local
LDAP_USER_SEARCH_BASE=ou=users,dc=fabric,dc=local
LDAP_GROUP_SEARCH_BASE=ou=groups,dc=fabric,dc=local
LDAP_MANAGER_DN=cn=admin,dc=fabric,dc=local
LDAP_ADMIN_PASSWORD=FabricAdmin123

# Server
server.port=8080
management.endpoints.web.exposure.include=health,info,metrics

# Logging
logging.level.com.fabric.batch=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.batch=DEBUG
spring.batch.jdbc.isolation-level-for-create=ISOLATION_READ_COMMITTED
